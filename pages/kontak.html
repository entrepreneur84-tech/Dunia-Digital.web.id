<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kontak – Dunia Digital</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="/assets/css/style.css">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f6f7fb;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:#1a73e8;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0f5fd0;
}

.success{
background:#e8f5e9;
padding:12px;
border-radius:8px;
margin-top:20px;
display:none;
}

.error{
background:#ffebee;
padding:12px;
border-radius:8px;
margin-top:20px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Kontak Dunia Digital</h1>

<p>
Jika Anda memiliki pertanyaan tentang ebook, lisensi, atau kerjasama,
silakan kirim pesan melalui form berikut.
</p>

<form id="contactForm">

<label>Nama</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Pesan</label>
<textarea id="message" rows="6" required></textarea>

<button type="submit">Kirim Pesan</button>

</form>

<div class="success" id="success">
Pesan berhasil dikirim. Tim Dunia Digital akan segera membalas email Anda.
</div>

<div class="error" id="error">
Terjadi kesalahan saat mengirim pesan.
</div>

</div>

</div>

<script>

document.getElementById("contactForm").addEventListener("submit",async function(e){

e.preventDefault()

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const message = document.getElementById("message").value

const res = await fetch("/api/contact",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
message
})

})

const data = await res.json()

if(data.ok){

document.getElementById("success").style.display="block"

document.getElementById("error").style.display="none"

document.getElementById("contactForm").reset()

}else{

document.getElementById("error").style.display="block"

}

})
<div style="display:none">
<label>Website</label>
<input type="text" id="website">
</div>
</script>

</body>
</html>
