<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>Baca Ebook</title>

<link rel="stylesheet" href="/assets/css/style.css">

</head>

<body>

<h1>Ebook Viewer</h1>

<iframe
id="ebook-frame"
width="100%"
height="800px">
</iframe>

<script>

const params = new URLSearchParams(window.location.search)

const file = params.get("file")

document.getElementById("ebook-frame").src =
"/api/download?file=" + file

</script>

</body>

</html>
