<!DOCTYPE html>
<html>
<head>
  <title>Viewer Ebook</title>
</head>
<body>
<h2>Masukkan License</h2>

<input id="license" placeholder="LICENSE">
<button onclick="openBook()">Buka Ebook</button>

<div id="book"></div>

<script>
async function openBook(){
  const license = document.getElementById("license").value
  const fingerprint = navigator.userAgent

  const res = await fetch("https://YOUR-WORKER.workers.dev/api/license", {
    method:"POST",
    body: JSON.stringify({ license, fingerprint })
  })
  const data = await res.json()

  if(!data.ok){ alert(data.msg); return }

  document.getElementById("book").innerHTML =
    "<iframe src='"+data.ebook+"' width='100%' height='600'></iframe>"
}
</script>
</body>
</html>
